apiVersion: v2
name: orchestra
description: >
  Orchestra platform — API server, operator, and frontend for managing
  RStudio workshop environments on Kubernetes.
type: application
version: 0.1.0
appVersion: "0.1.0"
dependencies:
  - name: oauth2-proxy
    version: "7.7.x"
    repository: "https://oauth2-proxy.github.io/manifests"
    condition: oauth2Proxy.enabled
  - name: postgresql
    version: "16.7.27"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: postgresql.enabled
