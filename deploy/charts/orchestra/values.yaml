# Orchestra Helm chart — default values.
# See docs/deployment/helm.md for a full reference and quickstart examples.

global:
  # Base domain. Produces app.<domain> (frontend) and api.<domain> (API).
  domain: "orchestra.localhost"
  # Default Kubernetes namespace for launching workshop sessions.
  defaultNamespace: "default"
  # Names of pre-existing imagePullSecrets in the release namespace.
  # Required when images are in a private registry.
  imagePullSecrets: []

# ── System node pool placement (GKE Standard, ADR-0005) ──────────────────────
# Pin the platform's own pods (operator, API, frontend) to the always-on,
# tainted system node pool so they never land on scale-to-zero NAP tenant nodes.
# Disabled by default so single-node / Autopilot / kind installs are unaffected;
# keys/values are config-driven to stay cloud-neutral. The GKE production
# instance sets enabled: true with the values below, matching the tofu module's
# system pool (label pool=system, taint dedicated=system:NoSchedule).
systemPool:
  enabled: false
  nodeSelectorKey: pool
  nodeSelectorValue: system
  taintKey: dedicated
  taintValue: system
  taintEffect: NoSchedule

# ── Operator ─────────────────────────────────────────────────────────────────
operator:
  image:
    repository: seandavi/orchestra-operator
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  logLevel: INFO
  # Default container image for newly launched workshop sessions.
  # Override per-template via the WorkshopTemplate spec.image field.
  defaultWorkshopImage: "rocker/rstudio:latest"

  # ── Tenant tier scheduling (ADR-0005) ─────────────────────────────────────
  # Config-driven map: tier name -> where its workshop pods may schedule. A
  # template selects a tier *by name* (its `tier:` field); the operator looks it
  # up here and stamps nodeSelector / tolerations / compute-class on the pod.
  #
  # DEFAULT IS EMPTY ({}), which is correct for GKE Autopilot and single-node
  # dev (kind, minikube): every tier resolves to "no constraints", so pods
  # schedule anywhere with zero setup. This keeps the operator cloud-neutral —
  # the values below are the GKE Standard production instance, not baked-in.
  #
  # Per-tier fields (all optional):
  #   nodeSelector:  plain node labels the pod must match.
  #   tolerations:   taints the tier's pool carries ({key,value,effect};
  #                  operator defaults to Equal, effect to NoSchedule).
  #   computeClass:  value for a single compute-class label (emitted under
  #                  computeClassLabelKey). GKE Node-Auto-Provisioning selects a
  #                  ComputeClass this way.
  # An unknown tier name (not in this map) falls back to "no constraints" and
  # logs a warning — a mistyped tier still runs rather than staying Pending.
  #
  # GKE Standard production example (NAP + ComputeClass, per deploy/tofu):
  #   tierMap:
  #     small:
  #       computeClass: tenant-compute
  #     large:
  #       computeClass: tenant-compute
  #   # Static-pool alternative (ADR-0005 "Not chosen" fallback):
  #   #   small:
  #   #     nodeSelector: { tenant-tier: small }
  #   #     tolerations: [{ key: tenant-size, value: small, effect: NoSchedule }]
  #   #   large:
  #   #     nodeSelector: { tenant-tier: large }
  #   #     tolerations: [{ key: tenant-size, value: large, effect: NoSchedule }]
  tierMap: {}
  # Label key used to emit each tier's `computeClass`. Default is GKE's
  # ComputeClass selector; override for other schedulers.
  computeClassLabelKey: "cloud.google.com/compute-class"
  # Grace period (seconds) for a workshop pod to flush its work to the PVC on
  # SIGTERM before being killed. ADR-0005 recommends 120 for interactive
  # RStudio/Jupyter sessions. (safe-to-evict=false is always stamped and is not
  # configurable — a live session must never be migrated for consolidation.)
  terminationGracePeriodSeconds: 120

  # Sidecar proxy configuration for workshop sessions.
  sidecar:
    image:
      repository: seandavi/orchestra-sidecar
      tag: latest
      pullPolicy: Always

# ── API server ────────────────────────────────────────────────────────────────
api:
  image:
    repository: seandavi/orchestra-api
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Email addresses that have admin privileges (can manage all sessions).
  adminEmails: []
  # Dev-mode identity bypass — set to an email to skip the auth proxy.
  # Only effective when requireAuthentication=false. Never set in production.
  devIdentity: null
  requireAuthentication: true

  # ── Git-managed workshop templates (ADR-0006) ─────────────────────────────
  # The catalog is served from the YAML files in files/templates/, projected
  # into a ConfigMap and mounted at mountPath; the API loads them into an
  # in-memory registry. The API pods roll automatically when a template file
  # changes. Enabled by default — this is how templates reach the API. Disable
  # only if you mount the templates some other way at mountPath.
  fileTemplates:
    enabled: true
    mountPath: /etc/orchestra/templates

  # ── Database ──────────────────────────────────────────────────────────────
  # Preferred: reference an existing Secret that contains the database URL.
  #   kubectl create secret generic orchestra-db \
  #     --from-literal=database-url='postgresql+asyncpg://user:pass@host:5432/db'
  # Fallback: set url directly (not recommended in production).
  database:
    existingSecret: ""
    secretKey: "database-url"
    url: ""

  # ── PodDisruptionBudget ───────────────────────────────────────────────────
  podDisruptionBudget:
    enabled: false
    minAvailable: 1

  # ── Security contexts ─────────────────────────────────────────────────────
  # Override per-platform:
  #   OpenShift: set runAsUser: null (platform assigns UID from namespace range)
  #   GKE Autopilot: raise cpu/memory requests to platform minimums (250m/512Mi)
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: [ALL]

  # ── Escape hatches ────────────────────────────────────────────────────────
  # Inject platform-specific sidecars (Cloud SQL Auth Proxy, Vault agent, etc.)
  # or extra environment variables without forking the chart.
  #
  # Example — Cloud SQL Auth Proxy sidecar (GCP):
  #   extraContainers:
  #     - name: cloud-sql-proxy
  #       image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
  #       args: ["--auto-iam-authn", "project:region:instance"]
  #   extraEnv:
  #     - name: ORCHESTRA_DATABASE_URL
  #       value: "postgresql+asyncpg://orchestra@localhost:5432/orchestra"
  extraEnv: []
  extraVolumeMounts: []
  extraVolumes: []
  extraContainers: []

# ── Frontend ──────────────────────────────────────────────────────────────────
frontend:
  image:
    repository: seandavi/orchestra-frontend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ── Workshop session persistence ──────────────────────────────────────────────
# Applies to all PersistentVolumeClaims created by the operator for sessions.
persistence:
  # Storage class for session PVCs. Leave "" to use the cluster default.
  # Common values: "standard-rwo" (GKE), "gp3" (EKS), "managed-premium" (AKS)
  storageClass: ""
  size: "10Gi"

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: true

  # Ingress controller preset. Determines which auth annotations are applied to
  # the frontend, API, and per-session workshop Ingress resources.
  #
  #   traefik  Traefik v2/v3 with ForwardAuth Middleware CRDs (recommended).
  #            When oauth2Proxy.enabled=true the chart creates the Middleware
  #            objects automatically. Per-session Ingress resources created by
  #            the operator also need these annotations — configure the operator
  #            with the same middleware name (orchestra-auth).
  #
  #            ⚠  GKE's native ingress controller (class "gce") is NOT
  #            compatible with per-session workshops: it provisions a new Cloud
  #            Load Balancer per Ingress (2-5 min, ~$20/mo each). Use Traefik
  #            or nginx-ingress on GKE instead.
  #
  #   nginx    ingress-nginx with auth-url subrequest annotations.
  #            oauth2-proxy handles auth; nginx calls it per request.
  #            Install ingress-nginx before deploying Orchestra.
  #
  #   custom   No auth annotations are added by the chart. Populate
  #            ingress.annotations with whatever your controller needs.
  #            Set oauth2Proxy.enabled=false if you bring your own proxy.
  #
  controller: traefik

  # Kubernetes ingressClassName. Leave "" to use the cluster default.
  className: traefik

  tls:
    enabled: true
    # cert-manager ClusterIssuer name. Leave "" to manage TLS yourself
    # (e.g. cloud-native managed certs, pre-existing wildcard secret).
    clusterIssuer: letsencrypt-prod
    # Use a pre-existing wildcard TLS secret instead of issuing per-host
    # certificates. When set, cert-manager annotations are omitted and
    # both ingresses reference this secret.
    existingSecret: ""

  # Extra annotations merged onto every Ingress resource regardless of
  # controller. Use for cloud LB config, nginx snippets, etc.
  # When controller=custom these are the sole annotations (plus cert-manager).
  annotations: {}

# ── NetworkPolicy ─────────────────────────────────────────────────────────────
networkPolicy:
  # Requires a CNI that supports NetworkPolicy (Calico, Cilium, GKE Dataplane V2).
  enabled: false

# ── oauth2-proxy (bundled) ────────────────────────────────────────────────────
# Set enabled=false if you bring your own auth proxy (corporate fleet, Cloudflare
# Access, GKE IAP, etc.). Your proxy must forward X-Auth-Request-Email to the API.
oauth2Proxy:
  enabled: true

  # fullProxy=true: oauth2-proxy sits in front of the frontend, proxying authenticated
  # requests to it and redirecting unauthenticated users to Google. The frontend ingress
  # routes to oauth2-proxy instead of directly to the frontend service. The API ingress
  # still uses ForwardAuth with oauth2-proxy for identity injection.
  #
  # fullProxy=false (default): standard ForwardAuth mode — the ingress middleware calls
  # oauth2-proxy's /oauth2/auth to validate the session before forwarding to the backend.
  # Note: Traefik v3 errors middleware does not emit a proper 302 on auth failure, so
  # unauthenticated browser requests receive a 401 with a Location header instead of a
  # transparent redirect. fullProxy=true is recommended for Traefik deployments.
  fullProxy: false

# ── oauth2-proxy subchart values ─────────────────────────────────────────────
# IMPORTANT: these MUST be at the root level (not nested under oauth2Proxy:) so
# Helm passes them to the bundled subchart. Credentials should never be inlined
# here — use existingSecret instead (see docs/deployment/oauth2-proxy.md).
#
# Minimal example:
#   "oauth2-proxy":
#     config:
#       existingSecret: orchestra-oauth-secrets
#       configFile: |
#         email_domains = [ "*" ]
#         upstreams = [ "http://orchestra-frontend.orchestra-system.svc.cluster.local:80" ]
#     extraArgs:
#       redirect-url: "https://app.YOUR_DOMAIN/oauth2/callback"
#       cookie-domain: ".YOUR_DOMAIN"
#       whitelist-domain: ".YOUR_DOMAIN"
#       set-xauthrequest: "true"
#       skip-provider-button: "true"
#
# Full subchart reference:
# https://github.com/oauth2-proxy/manifests/tree/main/helm/oauth2-proxy
"oauth2-proxy":
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
