# yaml-language-server: $schema=./template.schema.json
name: RillData, A powerbi-like platform built over DuckDB
slug: rilldata
description: One platform that turns SQL into governed dashboards, partner-ready embeds,
  and agent-ready context — all running on top of the warehouses you already use.
image: rilldata/rill
defaultDuration: 4h
port: 9009
tier: small
resources:
  cpu: '2'
  memory: 4Gi
  cpuRequest: 500m
  memoryRequest: 4Gi
  ephemeralStorage: 8Gi
  ephemeralStorageRequest: 8Gi
enabled: true
url: https://docs.rilldata.com/
sourceUrl: https://github.com/rilldata/rill
submittedBy: seandavi

