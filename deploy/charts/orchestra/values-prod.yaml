# Production overrides for the Orchestra Helm chart.
#
# Usage (layered — base defaults + this file + your secrets file):
#   helm upgrade --install orchestra ./deploy/charts/orchestra \
#     -n orchestra-system \
#     -f deploy/charts/orchestra/values.yaml \
#     -f deploy/charts/orchestra/values-prod.yaml \
#     -f deploy/YOUR-secrets.yaml   # gitignored, contains oauth2-proxy credentials
#
# See docs/deployment/helm.md for the full setup walkthrough.

global:
  domain: "TODO.example.edu"         # e.g. orchestra.myuni.edu
  imagePullSecrets: []               # add if images live in a private registry

# ── Operator ──────────────────────────────────────────────────────────────────
operator:
  image:
    repository: seandavi/orchestra-operator
    tag: "TODO"                       # pin to a specific release tag
    pullPolicy: IfNotPresent
  defaultWorkshopImage: "rocker/rstudio:latest"

# ── API server ────────────────────────────────────────────────────────────────
api:
  image:
    repository: seandavi/orchestra-api
    tag: "TODO"
    pullPolicy: IfNotPresent
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  adminEmails:
    - "TODO@example.edu"
  requireAuthentication: true
  database:
    existingSecret: "orchestra-db"   # see docs/deployment/helm.md#database
    secretKey: "database-url"
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  # GCP / Cloud SQL Auth Proxy example (uncomment and adjust):
  # extraContainers:
  #   - name: cloud-sql-proxy
  #     image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
  #     args: ["--auto-iam-authn", "project:region:instance"]
  #     securityContext:
  #       runAsNonRoot: true
  #       runAsUser: 65532
  # extraEnv:
  #   - name: ORCHESTRA_DATABASE_URL
  #     value: "postgresql+asyncpg://orchestra@localhost:5432/orchestra"

# ── Frontend ──────────────────────────────────────────────────────────────────
frontend:
  image:
    repository: seandavi/orchestra-frontend
    tag: "TODO"
    pullPolicy: IfNotPresent
  replicas: 2

# ── Workshop persistence ──────────────────────────────────────────────────────
persistence:
  storageClass: ""                   # "" = cluster default; "standard-rwo" on GKE
  size: "10Gi"

# ── Ingress ───────────────────────────────────────────────────────────────────
# See docs/deployment/ingress.md for Traefik vs nginx-ingress setup.
ingress:
  enabled: true
  controller: traefik                # "traefik" | "nginx" | "custom"
  className: traefik
  tls:
    enabled: true
    clusterIssuer: letsencrypt-prod

networkPolicy:
  enabled: true

# ── oauth2-proxy (bundled) ────────────────────────────────────────────────────
# fullProxy=true is recommended for Traefik: oauth2-proxy sits in front of the
# frontend and handles the login redirect transparently.
oauth2Proxy:
  enabled: true
  fullProxy: true

# Subchart credentials — MUST be at root level so Helm passes them to the subchart.
# Store credentials in a Secret (never inline them here):
#
#   kubectl create secret generic orchestra-oauth-secrets \
#     --from-literal=client-id='<GCP OAuth client ID>' \
#     --from-literal=client-secret='<GCP OAuth client secret>' \
#     --from-literal=cookie-secret="$(python3 -c 'import secrets; print(secrets.token_hex(16))')" \
#     -n orchestra-system
#
# Then reference it below. Keep the actual values in a gitignored secrets file
# (e.g. deploy/YOUR-secrets.yaml) that you supply as a third -f flag.
"oauth2-proxy":
  config:
    existingSecret: "orchestra-oauth-secrets"
    configFile: |-
      email_domains = [ "*" ]
      upstreams = [ "http://orchestra-frontend.orchestra-system.svc.cluster.local:80" ]
  extraArgs:
    # Replace TODO.example.edu with global.domain above
    redirect-url: "https://app.TODO.example.edu/oauth2/callback"
    cookie-domain: ".TODO.example.edu"
    whitelist-domain: ".TODO.example.edu"
    set-xauthrequest: "true"
    skip-provider-button: "true"
  # Optionally restrict to specific email addresses:
  # authenticatedEmailsFile:
  #   enabled: true
  #   restricted_access: |-
  #     user1@example.edu
  #     user2@example.edu
