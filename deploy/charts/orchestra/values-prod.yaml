# Production overrides for the Orchestra Helm chart.
# Apply on top of values.yaml:
#   helm upgrade --install orchestra . -f values.yaml -f values-prod.yaml
#
# Fill in every TODO before deploying. See docs/deployment/helm.md for details.

global:
  domain: "TODO.example.edu"         # e.g. orchestra.myuni.edu
  imagePullSecrets: []               # add if images live in a private registry

# ── Operator ──────────────────────────────────────────────────────────────────
operator:
  image:
    repository: seandavi/orchestra-operator
    tag: "TODO"                       # pin to a specific release tag
    pullPolicy: IfNotPresent
  defaultWorkshopImage: "rocker/rstudio:latest"

# ── API server ────────────────────────────────────────────────────────────────
api:
  image:
    repository: seandavi/orchestra-api
    tag: "TODO"
    pullPolicy: IfNotPresent
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  adminEmails:
    - "TODO@example.edu"
  requireAuthentication: true
  database:
    existingSecret: "orchestra-db"   # see docs/deployment/helm.md#database
    secretKey: "database-url"
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  # GCP / Cloud SQL Auth Proxy example (uncomment and adjust):
  # extraContainers:
  #   - name: cloud-sql-proxy
  #     image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
  #     args: ["--auto-iam-authn", "project:region:instance"]
  #     securityContext:
  #       runAsNonRoot: true
  #       runAsUser: 65532
  # extraEnv:
  #   - name: ORCHESTRA_DATABASE_URL
  #     value: "postgresql+asyncpg://orchestra@localhost:5432/orchestra"

# ── Frontend ──────────────────────────────────────────────────────────────────
frontend:
  image:
    repository: seandavi/orchestra-frontend
    tag: "TODO"
    pullPolicy: IfNotPresent
  replicas: 2

# ── Workshop persistence ──────────────────────────────────────────────────────
persistence:
  storageClass: ""                   # "" = cluster default; "standard-rwo" on GKE
  size: "10Gi"

# ── Ingress ───────────────────────────────────────────────────────────────────
# See docs/deployment/ingress.md for Traefik vs nginx-ingress setup.
ingress:
  enabled: true
  controller: traefik                # "traefik" | "nginx" | "custom"
  className: traefik
  tls:
    enabled: true
    clusterIssuer: letsencrypt-prod

networkPolicy:
  enabled: true

# ── oauth2-proxy ──────────────────────────────────────────────────────────────
# See docs/deployment/oauth2-proxy.md for credential setup.
oauth2Proxy:
  enabled: true
  config:
    clientID: "TODO"                 # GCP OAuth client ID
    clientSecret: "TODO"             # GCP OAuth client secret
    cookieSecret: "TODO"             # python3 -c "import secrets; print(secrets.token_hex(16))"
    allowedDomains:
      - "example.edu"                # restrict to your institution's email domain
    allowedEmails: []
