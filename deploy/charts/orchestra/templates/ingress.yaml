{{- if .Values.ingress.enabled }}
{{- $domain := .Values.global.domain }}
{{- $tlsEnabled := .Values.ingress.tls.enabled }}
{{- $clusterIssuer := .Values.ingress.tls.clusterIssuer }}
{{- $existingSecret := .Values.ingress.tls.existingSecret }}
{{- $controller := .Values.ingress.controller }}
{{- $fullProxy := and .Values.oauth2Proxy.enabled .Values.oauth2Proxy.fullProxy }}
---
# Frontend ingress.
# fullProxy=true: all traffic goes to oauth2-proxy, which handles auth and proxies
#   authenticated requests to the frontend. No auth annotations needed.
# fullProxy=false: traffic goes directly to the frontend; auth is enforced via
#   ForwardAuth middleware annotations (Traefik) or auth-url subrequest (nginx).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: orchestra-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "orchestra.labels" . | nindent 4 }}
  annotations:
    {{- if and $tlsEnabled $clusterIssuer (not $existingSecret) }}
    cert-manager.io/cluster-issuer: {{ $clusterIssuer | quote }}
    {{- end }}
    {{- if not $fullProxy }}
    {{- if eq $controller "traefik" }}
    traefik.ingress.kubernetes.io/router.middlewares: >-
      {{ .Release.Namespace }}-orchestra-auth-signin@kubernetescrd,
      {{ .Release.Namespace }}-orchestra-auth-headers@kubernetescrd,
      {{ .Release.Namespace }}-orchestra-auth@kubernetescrd
    {{- else if eq $controller "nginx" }}
    nginx.ingress.kubernetes.io/auth-url: "http://{{ .Release.Name }}-oauth2-proxy.{{ .Release.Namespace }}.svc.cluster.local:4180/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://app.{{ $domain }}/oauth2/start?rd=$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-Email,X-Auth-Request-User,X-Auth-Request-Access-Token"
    {{- end }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- if $tlsEnabled }}
  tls:
  - hosts:
    - "app.{{ $domain }}"
    secretName: {{ default "orchestra-frontend-tls" $existingSecret }}
  {{- end }}
  rules:
  - host: "app.{{ $domain }}"
    http:
      paths:
      {{- if $fullProxy }}
      # Full proxy mode: all requests go to oauth2-proxy, which handles auth and
      # proxies to the frontend. The /oauth2/ callbacks are handled internally.
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-oauth2-proxy
            port:
              number: 80
      {{- else }}
      - path: /
        pathType: Prefix
        backend:
          service:
            name: orchestra-frontend
            port:
              name: http
      # oauth2-proxy callback path — must be on the same host as the frontend.
      - path: /oauth2
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-oauth2-proxy
            port:
              number: 80
      {{- end }}
---
# API ingress — ForwardAuth ensures X-Auth-Request-Email is always forwarded.
# The API returns 401 for unauthenticated requests; the frontend JS handles
# the redirect to /oauth2/start when it receives a 401 from the API.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: orchestra-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "orchestra.labels" . | nindent 4 }}
  annotations:
    {{- if and $tlsEnabled $clusterIssuer (not $existingSecret) }}
    cert-manager.io/cluster-issuer: {{ $clusterIssuer | quote }}
    {{- end }}
    {{- if eq $controller "traefik" }}
    traefik.ingress.kubernetes.io/router.middlewares: >-
      {{ .Release.Namespace }}-orchestra-api-cors@kubernetescrd,
      {{ .Release.Namespace }}-orchestra-auth-headers@kubernetescrd,
      {{ .Release.Namespace }}-orchestra-auth@kubernetescrd
    {{- else if eq $controller "nginx" }}
    nginx.ingress.kubernetes.io/auth-url: "http://{{ .Release.Name }}-oauth2-proxy.{{ .Release.Namespace }}.svc.cluster.local:4180/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://app.{{ $domain }}/oauth2/start?rd=$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-Email,X-Auth-Request-User,X-Auth-Request-Access-Token"
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- if $tlsEnabled }}
  tls:
  - hosts:
    - "api.{{ $domain }}"
    secretName: {{ default "orchestra-api-tls" $existingSecret }}
  {{- end }}
  rules:
  - host: "api.{{ $domain }}"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: orchestra-api
            port:
              name: http
{{- end }}
