---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestra-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "orchestra.labels" . | nindent 4 }}
    {{- include "orchestra.selectorLabels" (dict "component" "api" "context" .) | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "orchestra.selectorLabels" (dict "component" "api" "context" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "orchestra.selectorLabels" (dict "component" "api" "context" .) | nindent 8 }}
    spec:
      serviceAccountName: orchestra-operator
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.api.podSecurityContext | nindent 8 }}
      containers:
      - name: api
        image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
        imagePullPolicy: {{ .Values.api.image.pullPolicy }}
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: ORCHESTRA_IN_CLUSTER
          value: "true"
        - name: ORCHESTRA_DEFAULT_NAMESPACE
          value: {{ .Values.global.defaultNamespace | quote }}
        - name: ORCHESTRA_REQUIRE_AUTHENTICATION
          value: {{ .Values.api.requireAuthentication | quote }}
        - name: ORCHESTRA_ADMIN_EMAILS
          value: {{ .Values.api.adminEmails | toJson | quote }}
        {{- if .Values.api.database.existingSecret }}
        - name: ORCHESTRA_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ .Values.api.database.existingSecret }}
              key: {{ .Values.api.database.secretKey }}
        {{- else if .Values.api.database.url }}
        - name: ORCHESTRA_DATABASE_URL
          value: {{ .Values.api.database.url | quote }}
        {{- end }}
        {{- if .Values.api.devIdentity }}
        - name: ORCHESTRA_DEV_IDENTITY
          value: {{ .Values.api.devIdentity | quote }}
        {{- end }}
        - name: ORCHESTRA_CORS_ORIGINS
          value: '["https://app.{{ .Values.global.domain }}"]'
        {{- with .Values.api.extraEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        resources:
          {{- toYaml .Values.api.resources | nindent 10 }}
        {{- with .Values.api.extraVolumeMounts }}
        volumeMounts:
          {{- toYaml . | nindent 8 }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        securityContext:
          {{- toYaml .Values.api.containerSecurityContext | nindent 10 }}
      {{- with .Values.api.extraContainers }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- with .Values.api.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: orchestra-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "orchestra.labels" . | nindent 4 }}
    {{- include "orchestra.selectorLabels" (dict "component" "api" "context" .) | nindent 4 }}
spec:
  selector:
    {{- include "orchestra.selectorLabels" (dict "component" "api" "context" .) | nindent 4 }}
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
  type: ClusterIP
