---
apiVersion: batch/v1
kind: Job
metadata:
  name: orchestra-migrate-{{ .Release.Revision }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "orchestra.labels" . | nindent 4 }}
    {{- include "orchestra.selectorLabels" (dict "component" "migrate" "context" .) | nindent 4 }}
  annotations:
    {{- if .Values.postgresql.enabled }}
    # With the bundled Postgres, a pre-install hook would deadlock a fresh
    # install: the hook blocks creation of the very StatefulSet it needs.
    # post-install lets Postgres come up first; the wait initContainer below
    # covers its startup window.
    "helm.sh/hook": post-install,pre-upgrade
    {{- else }}
    "helm.sh/hook": pre-install,pre-upgrade
    {{- end }}
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "orchestra.selectorLabels" (dict "component" "migrate" "context" .) | nindent 8 }}
    spec:
      restartPolicy: Never
      # Runs `alembic upgrade head` only — no Kubernetes API access — so it uses
      # the namespace default SA. (It must NOT reference the operator SA: this is
      # a pre-install hook that runs before the chart's SA exists, which breaks
      # every fresh install.)
      {{- if .Values.systemPool.enabled }}
      # Pin to the system pool alongside the API: on GKE Standard that's where the
      # nodes carry the Cloud SQL scope, so the migrate hook's cloud-sql-proxy
      # init sidecar can reach the database (a NAP tenant node would fail auth).
      nodeSelector:
        {{- include "orchestra.systemPoolNodeSelector" . | nindent 8 }}
      {{- include "orchestra.systemPoolTolerations" . | nindent 6 }}
      {{- end }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      {{- if or .Values.postgresql.enabled .Values.api.extraContainers }}
      initContainers:
      {{- if .Values.postgresql.enabled }}
      - name: wait-for-postgres
        image: busybox:1.37
        command: ["sh", "-c", "until nc -z {{ include "orchestra.postgresqlHost" . }} 5432; do echo waiting for postgres; sleep 2; done"]
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      {{- end }}
      {{- range .Values.api.extraContainers }}
      - {{ toYaml . | nindent 8 | trim }}
        restartPolicy: Always
      {{- end }}
      {{- end }}
      containers:
      - name: migrate
        image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
        imagePullPolicy: {{ .Values.api.image.pullPolicy }}
        command: ["uv", "run", "alembic", "upgrade", "head"]
        env:
        - name: UV_CACHE_DIR
          value: /tmp/uv-cache
        {{- if .Values.postgresql.enabled }}
        - name: ORCHESTRA_DATABASE_URL
          value: {{ include "orchestra.postgresqlURL" . | quote }}
        {{- else if .Values.api.database.existingSecret }}
        - name: ORCHESTRA_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ .Values.api.database.existingSecret }}
              key: {{ .Values.api.database.secretKey }}
        {{- else if .Values.api.database.url }}
        - name: ORCHESTRA_DATABASE_URL
          value: {{ .Values.api.database.url | quote }}
        {{- end }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
