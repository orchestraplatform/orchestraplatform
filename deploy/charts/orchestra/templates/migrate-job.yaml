---
apiVersion: batch/v1
kind: Job
metadata:
  name: orchestra-migrate-{{ .Release.Revision }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "orchestra.labels" . | nindent 4 }}
    {{- include "orchestra.selectorLabels" (dict "component" "migrate" "context" .) | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "orchestra.selectorLabels" (dict "component" "migrate" "context" .) | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: orchestra-operator
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      {{- if .Values.api.extraContainers }}
      initContainers:
      {{- range .Values.api.extraContainers }}
      - {{ toYaml . | nindent 8 | trim }}
        restartPolicy: Always
      {{- end }}
      {{- end }}
      containers:
      - name: migrate
        image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
        imagePullPolicy: {{ .Values.api.image.pullPolicy }}
        command: ["uv", "run", "alembic", "upgrade", "head"]
        env:
        - name: UV_CACHE_DIR
          value: /tmp/uv-cache
        {{- if .Values.api.database.existingSecret }}
        - name: ORCHESTRA_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ .Values.api.database.existingSecret }}
              key: {{ .Values.api.database.secretKey }}
        {{- else if .Values.api.database.url }}
        - name: ORCHESTRA_DATABASE_URL
          value: {{ .Values.api.database.url | quote }}
        {{- end }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
