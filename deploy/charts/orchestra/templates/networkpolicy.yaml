{{- if .Values.networkPolicy.enabled }}
---
# Allow the API to receive traffic from:
#   - the Traefik ingress controller (routes external requests in)
#   - other orchestra pods (oauth2-proxy ForwardAuth, frontend)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: orchestra-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "orchestra.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "orchestra.selectorLabels" (dict "component" "api" "context" .) | nindent 6 }}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: traefik
    ports:
    - protocol: TCP
      port: 8000
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: orchestra
    ports:
    - protocol: TCP
      port: 8000
---
# Allow the frontend to receive traffic from the Traefik ingress controller
# and from the oauth2-proxy (which proxies authenticated requests in fullProxy mode).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: orchestra-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "orchestra.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "orchestra.selectorLabels" (dict "component" "frontend" "context" .) | nindent 6 }}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: traefik
    ports:
    - protocol: TCP
      port: 80
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: orchestra
    ports:
    - protocol: TCP
      port: 80
{{- end }}
