{{- if .Values.oauth2Proxy.enabled }}
{{- $cfg := .Values.oauth2Proxy.config }}
---
# Credentials for the bundled oauth2-proxy. Passed as env vars into the subchart.
# These are passed as environment variables into the subchart's Deployment
# via the oauth2-proxy chart's standard envFrom / extraEnv mechanism.
apiVersion: v1
kind: Secret
metadata:
  name: orchestra-oauth2-proxy-creds
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "orchestra.labels" . | nindent 4 }}
type: Opaque
stringData:
  OAUTH2_PROXY_CLIENT_ID: {{ $cfg.clientID | quote }}
  OAUTH2_PROXY_CLIENT_SECRET: {{ $cfg.clientSecret | quote }}
  OAUTH2_PROXY_COOKIE_SECRET: {{ $cfg.cookieSecret | quote }}
{{- if eq .Values.ingress.controller "traefik" }}
---
# ForwardAuth middleware — delegates auth decisions to oauth2-proxy.
# oauth2-proxy validates the session cookie and injects X-Auth-Request-Email,
# which the Orchestra API reads to identify the caller.
#
# Only created when ingress.controller=traefik. For nginx-ingress, auth is
# wired via nginx.ingress.kubernetes.io/auth-url annotations instead.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: orchestra-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "orchestra.labels" . | nindent 4 }}
spec:
  forwardAuth:
    address: {{ include "orchestra.oauth2ProxyAuthURL" . | quote }}
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - X-Auth-Request-Access-Token
      - Set-Cookie
---
# Header-strip middleware — clears X-Auth-Request-* before the ForwardAuth
# middleware re-sets them. Prevents clients from forging identity headers.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: orchestra-auth-headers
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "orchestra.labels" . | nindent 4 }}
spec:
  headers:
    customRequestHeaders:
      X-Auth-Request-User: ""
      X-Auth-Request-Email: ""
      X-Auth-Request-Access-Token: ""
{{- end }}
{{- end }}
