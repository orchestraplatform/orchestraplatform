{{- if .Values.oauth2Proxy.enabled }}
{{- if eq .Values.ingress.controller "traefik" }}
---
# ForwardAuth middleware — delegates auth decisions to oauth2-proxy.
# oauth2-proxy validates the session cookie and injects X-Auth-Request-Email,
# which the Orchestra API reads to identify the caller.
#
# In fullProxy mode this middleware is only applied to the API ingress.
# In forwardAuth mode it is applied to both the frontend and API ingresses.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: orchestra-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "orchestra.labels" . | nindent 4 }}
spec:
  forwardAuth:
    address: {{ include "orchestra.oauth2ProxyAuthURL" . | quote }}
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - X-Auth-Request-Access-Token
      - Set-Cookie
{{- if not .Values.oauth2Proxy.fullProxy }}
---
# Redirect-on-401 errors middleware (forwardAuth mode only).
# Note: Traefik v3 errors middleware copies headers from the inner service but
# keeps the original error status code, so this produces a 401 + Location header
# rather than a true 302. Use fullProxy=true for a seamless browser redirect.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: orchestra-auth-signin
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "orchestra.labels" . | nindent 4 }}
spec:
  errors:
    status:
      - "401-403"
    service:
      name: {{ .Release.Name }}-oauth2-proxy
      port: 80
    query: "/oauth2/start?rd={url}"
{{- end }}
---
# CORS middleware for the API ingress.
# Traefik's headers middleware automatically intercepts OPTIONS preflight requests
# and returns 200 with the CORS headers WITHOUT forwarding to ForwardAuth.
# This is essential because browsers strip cookies from preflight requests, so
# ForwardAuth would always return 401 for OPTIONS — blocking all cross-origin
# mutating requests (PATCH, DELETE, PUT, POST).
#
# For non-OPTIONS requests Traefik adds CORS response headers. FastAPI's own
# CORSMiddleware is intentionally disabled in production (ORCHESTRA_CORS_ORIGINS=[])
# to prevent duplicate Access-Control-Allow-Origin headers, which browsers reject.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: orchestra-api-cors
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "orchestra.labels" . | nindent 4 }}
spec:
  headers:
    accessControlAllowOriginList:
      - "https://app.{{ .Values.global.domain }}"
    accessControlAllowMethods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    accessControlAllowHeaders:
      - "Content-Type"
      - "Authorization"
      - "X-Auth-Request-Email"
      - "X-Auth-Request-User"
      - "X-Auth-Request-Access-Token"
    accessControlAllowCredentials: true
    accessControlMaxAge: 300
    addVaryHeader: true
---
# Header-strip middleware — clears X-Auth-Request-* before the ForwardAuth
# middleware re-sets them. Prevents clients from forging identity headers.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: orchestra-auth-headers
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "orchestra.labels" . | nindent 4 }}
spec:
  headers:
    customRequestHeaders:
      X-Auth-Request-User: ""
      X-Auth-Request-Email: ""
      X-Auth-Request-Access-Token: ""
{{- end }}
{{- end }}
