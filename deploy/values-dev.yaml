# Dev values — use with `helm install orchestra deploy/charts/orchestra -f deploy/values-dev.yaml`
# Targets a local kind cluster with Docker Desktop. No TLS, no oauth2-proxy.

global:
  domain: orchestra.localhost

api:
  requireAuthentication: false
  devIdentity: dev@example.com
  adminEmails:
    - dev@example.com
  image:
    pullPolicy: Never

ingress:
  enabled: true
  className: traefik
  # Docker Desktop / kind: Traefik serves the `web` entrypoint at NodePort 30080
  # (per `just dev-setup`), so per-session workshops must be emitted there — not
  # the TLS-only production default `websecure` — and the port appended to the
  # session URL (http://<name>.<domain>:30080). Mirrors `just dev-operator`.
  entryPoints: ["web"]
  port: "30080"
  tls:
    enabled: false
    clusterIssuer: ""

oauth2Proxy:
  enabled: false

operator:
  image:
    pullPolicy: Never

frontend:
  image:
    pullPolicy: Never
