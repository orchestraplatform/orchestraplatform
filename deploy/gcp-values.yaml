global:
  domain: "orchestraplatform.org"
  defaultNamespace: "default"

operator:
  image:
    repository: us-central1-docker.pkg.dev/orchestraplatform-dev/orchestra/orchestra-operator
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
  defaultWorkshopImage: "rocker/rstudio:latest"
  sidecar:
    image:
      repository: us-central1-docker.pkg.dev/orchestraplatform-dev/orchestra/orchestra-sidecar
      tag: latest
      pullPolicy: Always

api:
  image:
    repository: us-central1-docker.pkg.dev/orchestraplatform-dev/orchestra/orchestra-api
    tag: latest
    pullPolicy: Always
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  adminEmails:
    - "seandavi@gmail.com"
  requireAuthentication: true
  database:
    existingSecret: "orchestra-db"
    secretKey: "database-url"
  podDisruptionBudget:
    enabled: false
  extraEnv:
    - name: UV_CACHE_DIR
      value: /tmp/uv-cache

  extraVolumeMounts:
    - name: tmp
      mountPath: /tmp

  extraVolumes:
    - name: tmp
      emptyDir: {}

  extraContainers:
    - name: cloud-sql-proxy
      image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
      args:
        - "orchestraplatform-dev:us-central1:orchestra-db"
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      resources:
        requests:
          cpu: 250m
          memory: 512Mi

frontend:
  image:
    repository: us-central1-docker.pkg.dev/orchestraplatform-dev/orchestra/orchestra-frontend
    tag: latest
    pullPolicy: Always
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi

persistence:
  storageClass: "standard-rwo"
  size: "10Gi"

ingress:
  enabled: true
  controller: traefik
  className: traefik
  tls:
    enabled: true
    clusterIssuer: letsencrypt-prod
    existingSecret: orchestra-wildcard-tls

networkPolicy:
  enabled: false

# Orchestra-chart-level oauth2Proxy config: controls middleware templates and
# fullProxy routing mode. Credentials are NOT set here — they go in the
# top-level oauth2-proxy section below (direct subchart value passthrough).
oauth2Proxy:
  enabled: true
  fullProxy: true

# ── oauth2-proxy subchart values (top-level key required by Helm) ─────────────
# All credential and runtime config must be here so Helm passes them to the
# subchart. Values nested under oauth2Proxy."oauth2-proxy" are ignored by Helm.
"oauth2-proxy":
  replicaCount: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
  config:
    # Credentials should be managed in a Kubernetes Secret.
    #   kubectl create secret generic orchestra-oauth-secrets \
    #     --from-literal=client-id='...' \
    #     --from-literal=client-secret='...' \
    #     --from-literal=cookie-secret='...'
    existingSecret: "orchestra-oauth-secrets"
    # configFile sets the oauth2_proxy.cfg content.
    # upstreams: proxy authenticated requests to the frontend service.
    configFile: |-
      email_domains = [ "*" ]
      upstreams = [ "http://orchestra-frontend.orchestra-system.svc.cluster.local:80" ]
  extraArgs:
    # Always use the external callback URL regardless of the inbound Host header.
    redirect-url: "https://app.orchestraplatform.org/oauth2/callback"
    # Scope cookie to all subdomains for cross-service auth.
    cookie-domain: ".orchestraplatform.org"
    # Allow redirect back to any subdomain after login.
    whitelist-domain: ".orchestraplatform.org"
    # Skip the "Sign in with Google" button page; go straight to Google.
    skip-provider-button: "true"
    # Emit X-Auth-Request-Email (and User/Access-Token) in /oauth2/auth responses
    # so Traefik's ForwardAuth can copy them to the upstream request. Without this
    # oauth2-proxy only returns Gap-Auth, which the API doesn't read.
    set-xauthrequest: "true"
  # Restrict login to specific email addresses.
  authenticatedEmailsFile:
    enabled: true
    restricted_access: |-
      seandavi@gmail.com
