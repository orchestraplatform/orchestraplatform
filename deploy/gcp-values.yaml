global:
  domain: "orchestraplatform.org"
  defaultNamespace: "default"

operator:
  image:
    repository: us-central1-docker.pkg.dev/orchestraplatform-dev/orchestra/orchestra-operator
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
  defaultWorkshopImage: "rocker/rstudio:latest"
  sidecar:
    image:
      repository: us-central1-docker.pkg.dev/orchestraplatform-dev/orchestra/orchestra-sidecar
      tag: latest
      pullPolicy: Always

api:
  image:
    repository: us-central1-docker.pkg.dev/orchestraplatform-dev/orchestra/orchestra-api
    tag: latest
    pullPolicy: Always
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  adminEmails:
    - "seandavi@gmail.com"
  requireAuthentication: true
  database:
    existingSecret: "orchestra-db"
    secretKey: "database-url"
  podDisruptionBudget:
    enabled: false
  extraEnv:
    - name: UV_CACHE_DIR
      value: /tmp/uv-cache

  extraVolumeMounts:
    - name: tmp
      mountPath: /tmp

  extraVolumes:
    - name: tmp
      emptyDir: {}

  extraContainers:
    - name: cloud-sql-proxy
      image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
      args:
        - "orchestraplatform-dev:us-central1:orchestra-db"
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      resources:
        requests:
          cpu: 250m
          memory: 512Mi

frontend:
  image:
    repository: us-central1-docker.pkg.dev/orchestraplatform-dev/orchestra/orchestra-frontend
    tag: latest
    pullPolicy: Always
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi

persistence:
  storageClass: "standard-rwo"
  size: "10Gi"

ingress:
  enabled: true
  controller: traefik
  className: traefik
  tls:
    enabled: true
    clusterIssuer: letsencrypt-prod
    existingSecret: orchestra-wildcard-tls

networkPolicy:
  enabled: false

# Orchestra-chart-level oauth2Proxy config: controls middleware templates and
# fullProxy routing mode. Credentials are NOT set here — they go in the
# top-level oauth2-proxy section below (direct subchart value passthrough).
oauth2Proxy:
  enabled: true
  fullProxy: true

# ── oauth2-proxy subchart values ─────────────────────────────────────────────
# Credentials (clientID / clientSecret / cookieSecret) are NOT here — they live
# in deploy/gcp-values-secrets.yaml (gitignored). Supply that file as the third
# -f argument when running helm upgrade (see justfile deploy-gcp recipe).
"oauth2-proxy":
  replicaCount: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
  config:
    configFile: |-
      email_domains = [ "*" ]
      upstreams = [ "http://orchestra-frontend.orchestra-system.svc.cluster.local:80" ]
  extraArgs:
    redirect-url: "https://app.orchestraplatform.org/oauth2/callback"
    cookie-domain: ".orchestraplatform.org"
    whitelist-domain: ".orchestraplatform.org"
    skip-provider-button: "true"
    set-xauthrequest: "true"
  authenticatedEmailsFile:
    enabled: true
    restricted_access: |-
      seandavi@gmail.com
