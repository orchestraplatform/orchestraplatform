version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orchestra
      POSTGRES_PASSWORD: orchestra
      POSTGRES_DB: orchestra
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestra"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - orchestra-network

  server:
    build:
      context: ./server
    ports:
      - "8001:8000"
    environment:
      - ORCHESTRA_DEBUG=true
      - ORCHESTRA_IN_CLUSTER=false
      - ORCHESTRA_REQUIRE_AUTHENTICATION=false
      - ORCHESTRA_DEV_IDENTITY=dev@example.com
      - ORCHESTRA_KUBE_CONTEXT=docker-desktop
      - ORCHESTRA_DATABASE_URL=postgresql+asyncpg://orchestra:orchestra@postgres:5432/orchestra

      - KUBECONFIG=/root/.kube/config
    volumes:
      - ~/.kube:/root/.kube:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - orchestra-network

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:8001
    ports:
      - "3002:80"
    environment:
      - VITE_API_URL=http://localhost:8001
    depends_on:
      - server
    networks:
      - orchestra-network

  operator:
    build:
      context: ./operator
    environment:
      - KUBE_CONTEXT=docker-desktop
      - KUBECONFIG=/root/.kube/config
      - ORCHESTRA_ENVIRONMENT=local
    volumes:
      - ~/.kube:/root/.kube:ro
    networks:
      - orchestra-network

  docs:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./docs:/app
    ports:
      - "3003:4321"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - orchestra-network

networks:
  orchestra-network:
    driver: bridge

volumes:
  postgres-data:
