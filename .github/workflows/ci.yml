name: CI

# Pull-request gate + main-branch guard. Runs the Python test suites, ruff, the
# template-tools package tests, and the template-schema-in-sync check. All steps
# call the same `just` recipes developers run locally, so CI and local can never
# silently disagree.

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  server:
    name: server (pytest + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          # uv reads server/.python-version (3.13); cache keyed on the lockfiles.
          enable-cache: true
          cache-dependency-glob: |
            server/uv.lock
            template-tools/uv.lock

      - uses: extractions/setup-just@v2

      # `server` depends on the sibling `template-tools` path package
      # ([tool.uv.sources]), so a bare `uv sync` in server/ resolves both.
      - name: Sync server deps
        run: cd server && uv sync --group dev

      - name: Lint (ruff check + format --check)
        run: just lint-server

      - name: Test (pytest — includes the ORM mapper-guard)
        run: just test-server

  template-tools:
    name: template-tools (pytest + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: template-tools/uv.lock

      - uses: extractions/setup-just@v2

      - name: Sync template-tools deps
        run: cd template-tools && uv sync --group dev

      - name: Lint (ruff check + format --check)
        run: just lint-template-tools

      - name: Test (pytest)
        run: just test-template-tools

  operator:
    name: operator (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: operator/uv.lock

      - uses: extractions/setup-just@v2

      - name: Sync operator deps
        run: cd operator && uv sync --group dev

      # Tests only: the operator carries pre-existing ruff/format debt that is
      # out of scope here; covering the scheduling/tier-map logic is the point.
      - name: Test (pytest)
        run: just test-operator

  schema-in-sync:
    name: template schema in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            server/uv.lock
            template-tools/uv.lock

      - uses: extractions/setup-just@v2

      - name: Sync server deps
        run: cd server && uv sync --group dev

      # Regenerates template.schema.json and fails if `git diff` is non-empty,
      # i.e. the committed schema is stale versus the pydantic model.
      - name: Check template.schema.json is in sync
        run: just check-schema
