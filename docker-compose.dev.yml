# Development Docker Compose — hot-reload for server and frontend.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up
#
# Prerequisites (run once):
#   just dev-setup
#
# Differences from docker-compose.yml:
#   - server: source code is volume-mounted; uvicorn runs with --reload
#   - frontend: runs the Vite dev server (HMR) instead of a static nginx build
#   - operator: source code is volume-mounted; runs directly with uv
#   - docs: unchanged (already uses npm run dev)

version: '3.8'

services:
  server:
    build:
      context: ./server
    ports:
      - "8001:8000"
    environment:
      - ORCHESTRA_DEBUG=true
      - ORCHESTRA_IN_CLUSTER=false
      - ORCHESTRA_REQUIRE_AUTHENTICATION=false
      - ORCHESTRA_KUBE_CONTEXT=docker-desktop
      - KUBECONFIG=/root/.kube/config
    volumes:
      - ./server:/app
      - ~/.kube:/root/.kube:ro
      # Keep the venv from the image rather than overwriting with an empty dir
      - /app/.venv
    command: ["uv", "run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    networks:
      - orchestra-network

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3002:5173"
    environment:
      - VITE_API_URL=http://localhost:8001
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - server
    networks:
      - orchestra-network

  operator:
    build:
      context: ./operator
    environment:
      - KUBE_CONTEXT=docker-desktop
      - KUBECONFIG=/root/.kube/config
      - ORCHESTRA_ENVIRONMENT=local
    volumes:
      - ./operator:/app
      - ~/.kube:/root/.kube:ro
      - /app/.venv
    command: ["uv", "run", "python", "src/main.py"]
    networks:
      - orchestra-network

  docs:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./docs:/app
    ports:
      - "3003:4321"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - orchestra-network

networks:
  orchestra-network:
    driver: bridge
